# =============================================================================
# nav2_params.yaml — Nav2 navigation stack configuration (M3.C3.1 + C3.2)
# =============================================================================
#
# Pioneer 3-AT parameters:
#   robot_radius ≈ 0.3 m   max_vel_x = 0.7 m/s   max_vel_theta = 1.5 rad/s
#   wheel_separation = 0.394 m   wheel_radius = 0.111 m
#
# Works with slam_toolbox (M2): SLAM publishes map→odom TF + /map; no amcl/map_server needed.
#
# cmd_vel pipeline (determined by navigation_launch.py remappings):
#   controller_server → cmd_vel_nav
#   → velocity_smoother → cmd_vel_smoothed
#   → collision_monitor → /cmd_vel → Gazebo / Pioneer
#
# C3.2: goal_checker tolerances tightened (xy=0.15 m, yaw=0.10 rad) to satisfy
#       PDF Part 1 Task 5 "correct position and orientation".
# =============================================================================

lifecycle_manager_navigation:
  ros__parameters:
    # bond_timeout: maximum time (s) for lifecycle_manager to wait for each managed node to establish a bond.
    # The default 4.0 s is too short on ARM64/Parallels:
    #   - DDS peer discovery takes 1-5 s
    #   - 10 Nav2 nodes (controller/planner/bt_navigator etc.) initialise sequentially
    #   - each node's bond handshake takes additional time
    # On timeout lifecycle_manager aborts the activation sequence; all nodes stay unconfigured
    # and /navigate_to_pose action server never appears.
    # 30.0 s gives the ARM64 VM enough headroom to complete all bond handshakes.
    bond_timeout: 30.0

    # attempt_respawn_on_failure: whether to auto-restart a node that crashes.
    # false: report the error immediately after crash, making debugging easier (no issue masking).
    attempt_respawn_on_failure: false

    # bond_respawn_max_duration: upper limit for respawn wait; works together with bond_timeout.
    bond_respawn_max_duration: 10.0

bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered          # EKF fused output (not raw /odom)
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 5000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    # controller_frequency reduced from 20 to 10 Hz:
    #   MPPI batch_size=800 × time_steps=40 saturates the CPU at 20 Hz on ARM64/Parallels,
    #   causing cmd_vel gaps >1 s → velocity_smoother timeout clears velocity → robot stalls.
    #   10 Hz is still smooth enough (one command per 0.1 s) and faster in practice than a saturated 20 Hz.
    controller_frequency: 20.0
    costmap_update_timeout: 0.30
    # TF query tolerance under sim clock: when the controller transforms the path from map to base_link,
    # the default 0.1 s tolerance times out on the first call when Gazebo sim_time lags wall time,
    # producing error_code=203 (CONTROLLING_FAILED). 0.3 s is consistent with EKF/MPPI tolerance.
    transform_tolerance: 0.3
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    use_realtime_priority: false

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 15.0

    # C3.2: strict goal tolerances — arrive at specified position and heading (PDF Part 1 Task 5)
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25        # tighter than default 0.25 m
      yaw_goal_tolerance: 0.20       # tighter than default 0.25 rad (≈ 5.7°)

    # MPPI controller: stochastic trajectory optimisation, DiffDrive motion model
    # Pioneer 3-AT velocity limits: vx_max=0.7 m/s, wz_max=1.5 rad/s
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      # time_steps × model_dt = prediction horizon: 40 × 0.05 = 2.0 s (was 56 × 0.05 = 2.8 s)
      # Reducing time_steps and batch_size by ≈ 60% each cuts CPU from ≈ 224 M ops/s to ≈ 32 M ops/s.
      time_steps: 60
      model_dt: 0.05
      batch_size: 2200
      ax_max: 5.0          # Pioneer 3-AT max x acceleration (simulation)
      ax_min: -3.0
      ay_max: 3.0
      ay_min: -3.0
      az_max: 3.5
      vx_std: 0.2
      vy_std: 0.2
      wz_std: 0.4
      vx_max: 1.5        # Pioneer 3-AT max linear velocity
      vx_min: -0.3       # allow small reverse motion (recovery behaviour)
      vy_max: 0.5
      wz_max: 2.5        # Pioneer 3-AT max angular velocity
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 0.2
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize: false         # disable MPPI trajectory visualisation (not needed during mapping; may rotate with robot on TF issues)
      regenerate_noises: true
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstraints:
        min_turning_r: 0.2
      critics: [
        "ConstraintCritic", "CostCritic", "GoalCritic",
        "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic",
        "PathAngleCritic", "PreferForwardCritic"]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        # Raised from 5.0 to 10.0: stronger forward preference doubles the cost of reverse-trajectory
        # samples, significantly reducing unnecessary reversing during exploration.
        cost_weight: 10.0
        threshold_to_consider: 0.5
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        near_collision_cost: 253
        critical_cost: 300.0
        consider_footprint: false
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      robot_radius: 0.3             # Pioneer 3-AT (width 0.55 m; conservative inscribed radius)
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55      # inflation boundary slightly larger than robot_radius
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.3             # Pioneer 3-AT
      resolution: 0.05
      track_unknown_space: true
      # Global costmap uses only the completed static map.
      # The /scan obstacle layer is reserved for local_costmap near-field avoidance;
      # adding it to global_costmap would permanently accumulate scan endpoints in the
      # map frame during waypoint navigation, then inflate them into large merged cost regions.
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 6.0
        inflation_radius: 0.35
      always_send_full_costmap: True

map_saver:
  ros__parameters:
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    costmap_update_timeout: 1.0
    # TF tolerance consistent with controller_server (the 0.1 s default is insufficient under sim clock)
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: true               # A* is faster than Dijkstra in obstacle-rich environments
      allow_unknown: true           # allow planning through unknown space (map is incomplete during exploration)

smoother_server:
  ros__parameters:
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 2.0
    # min_rotational_vel reduced from 1.5 back to 0.8 rad/s:
    #   At 1.5 rad/s slam_toolbox ICP cannot keep up (one frame per 0.13 s);
    #   matching failures fall back to odom, recording the same wall at multiple positions ("ghost walls").
    #   0.8 rad/s takes ≈ 8 s per full rotation, still twice as fast as the original 0.4 rad/s,
    #   but SLAM scan matching remains reliable.
    min_rotational_vel: 0.8
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

route_server:
  ros__parameters:
    boundary_radius_to_achieve_node: 1.0
    radius_to_achieve_node: 2.0
    smooth_corners: true
    operations: ["AdjustSpeedLimit", "ReroutingService", "CollisionMonitor"]
    ReroutingService:
      plugin: "nav2_route::ReroutingService"
    AdjustSpeedLimit:
      plugin: "nav2_route::AdjustSpeedLimit"
    CollisionMonitor:
      plugin: "nav2_route::CollisionMonitor"
      max_collision_dist: 3.0
    edge_cost_functions: ["DistanceScorer", "CostmapScorer"]
    DistanceScorer:
      plugin: "nav2_route::DistanceScorer"
    CostmapScorer:
      plugin: "nav2_route::CostmapScorer"

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [1.5, 0.0, 2.5] # [0.7, 0.0, 1.5]       # Pioneer 3-AT velocity limits
    min_velocity: [-0.3, 0.0, -1.5]
    max_accel: [4.0, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "/odometry/filtered"     # EKF fused output (not raw /odom)
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    # velocity_timeout raised from 1.0 to 2.0 s:
    #   On ARM64/Parallels MPPI computation occasionally exceeds 1 s; the smoother then
    #   clears velocity and the robot stalls. 2.0 s gives MPPI more headroom and reduces
    #   unnecessary velocity zeroing.
    velocity_timeout: 2.0

collision_monitor:
  ros__parameters:
    base_frame_id: "base_link"          # Pioneer 3-AT body frame (not base_footprint)
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    # C_S.1: renamed cmd_vel → cmd_vel_nav2; twist_mux arbitrates and outputs /cmd_vel
    cmd_vel_out_topic: "cmd_vel_nav2"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: True
    stop_pub_timeout: 2.0
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 1.2
      simulation_time_step: 0.1
      min_points: 6
      visualize: False
      enabled: True
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
      min_height: 0.15
      max_height: 2.0
      enabled: True

docking_server:
  ros__parameters:
    controller_frequency: 50.0
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: "base_link"
    fixed_frame: "odom"
    dock_backwards: false
    dock_prestaging_tolerance: 0.5
    dock_plugins: ['simple_charging_dock']
    simple_charging_dock:
      plugin: 'opennav_docking::SimpleChargingDock'
      docking_threshold: 0.05
      staging_x_offset: -0.7
      use_external_detection_pose: true
      use_battery_status: false
      use_stall_detection: false
      external_detection_timeout: 1.0
      external_detection_translation_x: -0.18
      external_detection_translation_y: 0.0
      external_detection_rotation_roll: -1.57
      external_detection_rotation_pitch: -1.57
      external_detection_rotation_yaw: 0.0
      filter_coef: 0.1
    controller:
      k_phi: 3.0
      k_delta: 2.0
      v_linear_min: 0.15
      v_linear_max: 0.15
      use_collision_detection: true
      costmap_topic: "local_costmap/costmap_raw"
      footprint_topic: "local_costmap/published_footprint"
      transform_tolerance: 0.1
      projection_time: 5.0
      simulation_step: 0.1
      dock_collision_threshold: 0.3
