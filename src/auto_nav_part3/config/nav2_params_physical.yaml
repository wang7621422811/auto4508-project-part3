# =============================================================================
# nav2_params_physical.yaml — Nav2 导航栈物理机配置 (M6 / M3.C3.1)
# =============================================================================
#
# 对应硬件：Pioneer 3-AT 真实机器人
#   最大线速 vx_max: 0.7 m/s  （真机安全上限，仿真可跑到 1.5m/s）
#   最大角速 wz_max: 1.5 rad/s（真机安全上限）
#   车体半径 robot_radius: 0.3 m（Pioneer 3-AT 宽 0.55m，保守半径）
#
# 与 nav2_params.yaml（仿真版）的核心差异：
#   1. vx_max/wz_max    降低到真机安全速度，防止真实电机过载
#   2. max_velocity     velocity_smoother 上限对齐真机
#   3. controller_frequency: 20.0  真机 CPU 充足，恢复 20Hz 控制频率
#   4. bond_timeout: 10.0  真机比 ARM VM 启动更快，10s 足够 bond 建立
#   5. transform_tolerance: 0.1  真机时钟准确，不需要仿真的 0.3s 容差
#   6. ax_max/ax_min    加速度上限降低，与真实 Pioneer 驱动能力对齐
#
# ⚠️  速度参数对真实硬件安全至关重要：
#     首次上真机务必以低速测试（建议先将 vx_max 设为 0.3m/s 调通后再提速）
# TODO: 实验室首次调试时确认 vx_max 不超过 0.5m/s，稳定后再调高到 0.7m/s。
#
# =============================================================================

lifecycle_manager_navigation:
  ros__parameters:
    # 真机比 ARM64 VM 启动快，10s 足够 Nav2 全部节点完成 bond 建立。
    # 仿真版需要 30s 是因为 VM 上 DDS 发现和节点初始化显著更慢。
    bond_timeout: 10.0
    attempt_respawn_on_failure: false
    bond_respawn_max_duration: 10.0

bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    # 真机 CPU 性能充足，恢复 20Hz 控制频率（仿真因 ARM VM CPU 饱和降为 10Hz）。
    controller_frequency: 20.0
    costmap_update_timeout: 0.30
    # 真机使用系统时钟，TF 时间戳精确，0.1s 容差已足够。
    # 仿真需要 0.3s 是因为 Gazebo sim_time 步长引起的时间戳偏差。
    transform_tolerance: 0.1
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    use_realtime_priority: false

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 15.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.20

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 60
      model_dt: 0.05
      batch_size: 2200
      # ⚠️  真机加速度上限：Pioneer 3-AT 电机额定加速度约 3m/s²
      # 仿真版 ax_max=5.0 对真机不安全，降低到 2.5m/s²。
      # TODO: 实验室验证后根据实际表现微调。
      ax_max: 2.5
      ax_min: -2.0
      ay_max: 2.0
      ay_min: -2.0
      az_max: 2.0
      vx_std: 0.2
      vy_std: 0.2
      wz_std: 0.4
      # ⚠️  真机安全速度上限：Pioneer 3-AT 最大线速 1.2m/s，取保守值 0.7m/s。
      # TODO: 首次上机以 0.3m/s 验证，稳定后逐步提高到 0.7m/s。
      vx_max: 0.3            # 首次上机低速测试，稳定后改回 0.7
      vx_min: -0.1
      vy_max: 0.3
      wz_max: 0.8            # 首次上机低速测试，稳定后改回 1.5
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize: false
      regenerate_noises: true
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstraints:
        min_turning_r: 0.2
      critics: [
        "ConstraintCritic", "CostCritic", "GoalCritic",
        "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic",
        "PathAngleCritic", "PreferForwardCritic"]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0
        threshold_to_consider: 0.5
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        near_collision_cost: 253
        critical_cost: 300.0
        consider_footprint: false
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      robot_radius: 0.3
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.3
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          # 真机 SICK 雷达量程更大，raytrace 适当增大到 18m。
          raytrace_max_range: 18.0
          raytrace_min_range: 0.0
          obstacle_max_range: 15.0
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: True

map_saver:
  ros__parameters:
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    costmap_update_timeout: 1.0
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true

smoother_server:
  ros__parameters:
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    # 真机时钟精确，0.1s 容差已足够（仿真版用 0.1，真机保持一致）。
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 2.0
    # 真机 SLAM 扫描处理能力更强，0.8 rad/s 恢复旋转速度安全可靠。
    min_rotational_vel: 0.8
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

route_server:
  ros__parameters:
    boundary_radius_to_achieve_node: 1.0
    radius_to_achieve_node: 2.0
    smooth_corners: true
    operations: ["AdjustSpeedLimit", "ReroutingService", "CollisionMonitor"]
    ReroutingService:
      plugin: "nav2_route::ReroutingService"
    AdjustSpeedLimit:
      plugin: "nav2_route::AdjustSpeedLimit"
    CollisionMonitor:
      plugin: "nav2_route::CollisionMonitor"
      max_collision_dist: 3.0
    edge_cost_functions: ["DistanceScorer", "CostmapScorer"]
    DistanceScorer:
      plugin: "nav2_route::DistanceScorer"
    CostmapScorer:
      plugin: "nav2_route::CostmapScorer"

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    # ⚠️  真机速度上限：vx_max=0.7 m/s，wz_max=1.5 rad/s（与 MPPI 参数一致）
    # TODO: 首次上机验证通过后再解锁到此速度。
    max_velocity: [0.7, 0.0, 1.5]
    min_velocity: [-0.2, 0.0, -1.5]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.0, 0.0, -3.2]
    odom_topic: "/odometry/filtered"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    # 真机 MPPI 计算更快，1.0s 已足够（仿真需要 2.0s 因为 ARM VM 偶发延迟）。
    velocity_timeout: 1.0

collision_monitor:
  ros__parameters:
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel_nav2"
    state_topic: "collision_monitor_state"
    # 真机时钟精确，0.1s 容差已足够。
    transform_tolerance: 0.1
    source_timeout: 1.0
    base_shift_correction: True
    stop_pub_timeout: 2.0
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 1.2
      simulation_time_step: 0.1
      min_points: 6
      visualize: False
      enabled: True
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
      min_height: 0.15
      max_height: 2.0
      enabled: True
