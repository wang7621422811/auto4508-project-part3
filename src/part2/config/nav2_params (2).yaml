# =============================================================================
# Nav2 配置 - Pioneer 3-AT (AUTO4508 Part 2) - RPP 版
# =============================================================================
# 机器人: Pioneer 3-AT 4轮 skid-steer, 20kg
# 最大速度: 0.5 m/s, 角速度 1.0 rad/s
# Lidar: SICK TIM781, 25m 范围
#
# 控制器: RPP (Regulated Pure Pursuit) - 稳定的直线跟随
# 规划器: NavFn (Dijkstra-based 平面规划)
# =============================================================================

bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    default_nav_to_pose_bt_xml: "/opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    default_nav_through_poses_bt_xml: ""

# =============================================================================
# Controller Server - RPP (Regulated Pure Pursuit)
# =============================================================================
controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 30.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.7
      yaw_goal_tolerance: 3.14

    # ========================
    # RPP 控制器
    # ========================
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      
      # --- 速度 ---
      desired_linear_vel: 0.3
      min_linear_velocity: 0.05
      max_angular_accel: 1.5
      
      # --- Lookahead ---
      lookahead_dist: 0.8
      min_lookahead_dist: 0.4
      max_lookahead_dist: 1.2
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: true
      
      # --- 速度调节 ---
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.1
      
      # --- 路径 ---
      transform_tolerance: 0.2
      stateful: true
      
      # --- 朝向调整 ---
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.785
      rotate_to_heading_angular_vel: 0.6
      max_robot_pose_search_dist: 10.0
      
      # --- 后退 (false = 只前进) ---
      allow_reversing: false
      
      # --- 碰撞检测 ---
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.5
      
      # --- 接近目标 ---
      approach_velocity_scaling_dist: 1.0
      min_approach_linear_velocity: 0.05

# =============================================================================
# 局部 Costmap
# =============================================================================
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: False
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 8
      height: 8
      resolution: 0.05
      robot_radius: 0.35
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.6
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 25.0
          raytrace_min_range: 0.0
          obstacle_max_range: 20.0
          obstacle_min_range: 0.0
      always_send_full_costmap: True

# =============================================================================
# 全局 Costmap - 80x80m 覆盖远 waypoint
# =============================================================================
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: False
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.35
      resolution: 0.1
      track_unknown_space: true
      width: 80
      height: 80
      origin_x: -40.0
      origin_y: -40.0
      rolling_window: true
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 25.0
          raytrace_min_range: 0.0
          obstacle_max_range: 20.0
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.6
      always_send_full_costmap: True

# =============================================================================
# Planner Server - NavFn (Dijkstra)
# =============================================================================
planner_server:
  ros__parameters:
    expected_planner_frequency: 0.5
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 1.5
      use_astar: false
      allow_unknown: true

# =============================================================================
# Behavior Server (脱困)
# =============================================================================
behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: False
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.8
    min_rotational_vel: 0.4
    rotational_acc_lim: 2.0

# =============================================================================
# Waypoint Follower
# =============================================================================
waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 3000

# =============================================================================
# Velocity Smoother
# =============================================================================
velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.3, 0.0, 0.8]
    min_velocity: [-0.15, 0.0, -0.8]
    max_accel: [0.5, 0.0, 2.0]
    max_decel: [-1.0, 0.0, -2.0]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 3.0

# =============================================================================
# Collision Monitor - 双层保护
# =============================================================================
collision_monitor:
  ros__parameters:
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: True
    stop_pub_timeout: 2.0
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
      source_timeout: 1.0
      enabled: True
    polygons: ["PolygonSlow", "PolygonStop"]
    PolygonSlow:
      type: "circle"
      radius: 1.2
      action_type: "slowdown"
      max_points: 3
      slowdown_ratio: 0.4
    PolygonStop:
      type: "circle"
      radius: 0.5
      action_type: "stop"
      max_points: 3

# =============================================================================
# Docking (必须有, 虽然不用)
# =============================================================================
docking_server:
  ros__parameters:
    use_sim_time: False
    dock_plugins: ["simple_charging_dock"]
    simple_charging_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      use_battery_status: false

# =============================================================================
# Map Server (Part 3 用, Part 2 可空)
# =============================================================================
map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
